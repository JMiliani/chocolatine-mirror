name: chocolatine

on:
  push:
  pull_request:

env:
  MIRROR_SSH_URL: ${{ secrets.MIRROR_SSH_URL }}
  EXECUTABLES: "binary"

jobs:
  check_compilation_and_coding_style:
    if: "!startsWith(github.ref, 'refs/heads/no-ga/') && github.repository != 'JMiliani/chocolatine-mirror'"
    runs-on: ubuntu-latest
    container:
      image: epitechcontent/epitest-docker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run banana coding style check
        run: banana-check-repo .

      - name: Compile project
        run: make
        timeout-minutes: 2
        env:
          CC: epiclang

      - name: Check for coding style errors
        run: |
          if [ -f coding-style-reports.log ]; then
            while read line; do
              file=$(echo $line | cut -d':' -f1)
              line_num=$(echo $line | cut -d':' -f2)
              message=$(echo $line | cut -d':' -f3-)
              echo "::error file=$file,line=$line_num::$message"
            done < coding-style-reports.log
            exit 1
          fi

      - name: Clean project
        run: make clean

      - name: Check executables
        run: |
          for exe in $(echo $EXECUTABLES | tr ',' ' '); do
            if [ ! -x "$exe" ]; then
              echo "::error file=$exe::Binary not found or not executable"
              exit 1
            fi
          done

  run_tests:
    if: "!startsWith(github.ref, 'refs/heads/no-ga/') && github.repository != 'JMiliani/chocolatine-mirror'"
    runs-on: ubuntu-latest
    container:
      image: epitechcontent/epitest-docker
    needs: check_compilation_and_coding_style

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run tests
        run: make tests_run
        timeout-minutes: 2

  push_to_mirror:
    if: "!startsWith(github.ref, 'refs/heads/no-ga/') && github.repository != 'JMiliani/chocolatine-mirror' && github.event_name == 'push'"
    runs-on: ubuntu-latest
    needs: run_tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Mirror repository
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: ${{ env.MIRROR_SSH_URL }}
          ssh_private_key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}